<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeadSpace — Perler Bead Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --milk-white: #F9F8F4;
        --soft-cream: #F4F1EA;
        --cloud-beige: #ECE7DF;
        --board-cream: #F4ECC8;
        --text-primary: #3D3A35;
        --text-secondary: #8A857D;
        --text-muted: #B5B0A8;
        --folder-forest: #A8D5BA;
        --model-lake: #9BC7F7;
        --dataset-sand: #F3D19C;
        --docs-library: #D7C3F1;
        --git-activity: #FFB7B2;
        --iron-warm: #FF8C8E;
        --hover-glow: #FFFFFF;
        --selected-glow: #FFF1B8;
        --glass-bg: rgba(244, 241, 234, 0.78);
        --glass-border: rgba(189, 183, 172, 0.3);
        --shadow-soft: 0 4px 24px rgba(61, 58, 53, 0.08);
        --shadow-card: 0 8px 32px rgba(61, 58, 53, 0.12);
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 24px;
      }
      body {
        background: var(--milk-white);
        color: var(--text-primary);
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
        height: 100vh;
      }

      /* Top Nav */
      #topnav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 64px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 100;
        box-shadow: var(--shadow-soft);
        gap: 20px;
      }
      #topnav .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      #topnav .logo .bead-cluster {
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
        width: 28px;
      }
      #topnav .logo .bead-cluster .mini-bead {
        width: 8px; height: 8px;
        border-radius: 50%;
        transition: transform 0.3s ease;
      }
      #topnav .logo:hover .mini-bead {
        animation: jiggle 0.4s ease infinite alternate;
      }
      @keyframes jiggle {
        0% { transform: translate(0, 0); }
        100% { transform: translate(1px, -1px) rotate(5deg); }
      }
      #topnav .logo h1 {
        font-size: 20px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.5px;
      }

      #topnav .center {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 0 12px;
      }
      #workspace-input-wrap {
        position: relative;
        width: 100%;
        max-width: 460px;
        display: flex;
        gap: 8px;
      }
      #path-input {
        flex: 1;
        padding: 10px 16px 10px 40px;
        background: var(--milk-white);
        border: 2px dashed var(--cloud-beige);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: 'Nunito', sans-serif;
        font-size: 13px;
        font-weight: 600;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      #path-input::placeholder { color: var(--text-muted); font-weight: 400; }
      #path-input:focus {
        outline: none;
        border-color: var(--folder-forest);
        box-shadow: 0 0 0 4px rgba(168, 213, 186, 0.2);
      }
      #workspace-input-wrap .folder-icon {
        position: absolute;
        left: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
      }
      #browse-btn {
        padding: 0 14px;
        border: 2px solid var(--cloud-beige);
        background: var(--milk-white);
        border-radius: var(--radius-md);
        font-family: 'Nunito', sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-primary);
        cursor: pointer;
        transition: border-color 0.2s;
      }
      #browse-btn:hover { border-color: var(--folder-forest); }

      #topnav .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn-capsule {
        padding: 8px 16px;
        border: none;
        border-radius: 50px;
        font-family: 'Nunito', sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }
      .btn-capsule:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      }
      .btn-capsule:active { transform: translateY(0); }
      .btn-capsule:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      #scan-btn {
        background: linear-gradient(135deg, var(--folder-forest), #8BC4A8);
        color: #fff;
      }
      #iron-btn {
        background: linear-gradient(135deg, #FFB7B2, var(--iron-warm));
        color: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #iron-btn.active {
        background: linear-gradient(135deg, var(--iron-warm), #E55C5E);
        box-shadow: 0 0 0 3px rgba(255, 140, 142, 0.3);
      }

      .brush-control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 700;
      }
      #brush-slider {
        width: 80px;
        accent-color: var(--iron-warm);
      }

      /* Sidebar */
      #left-sidebar {
        position: fixed;
        top: 80px;
        left: 16px;
        bottom: 60px;
        width: 280px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 20px;
        z-index: 90;
        box-shadow: var(--shadow-soft);
        overflow-y: auto;
        display: none;
      }
      #left-sidebar.visible { display: block; }
      #left-sidebar h3 {
        font-size: 12px;
        font-weight: 800;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 12px;
        margin-top: 22px;
      }
      #left-sidebar h3:first-child { margin-top: 0; }

      .sidebar-btn {
        display: block;
        width: 100%;
        padding: 9px 14px;
        background: var(--milk-white);
        border: 1px solid var(--cloud-beige);
        border-radius: var(--radius-sm);
        font-family: 'Nunito', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary);
        cursor: pointer;
        margin-bottom: 8px;
        transition: border-color 0.2s, background 0.2s;
        text-align: left;
      }
      .sidebar-btn:hover {
        border-color: var(--iron-warm);
        background: rgba(255, 183, 178, 0.1);
      }

      #legend-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .legend-row {
        display: grid;
        grid-template-columns: 14px 1fr auto auto;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
      }
      .legend-bead {
        width: 12px; height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.08);
      }
      .legend-lang { color: var(--text-primary); }
      .legend-perler { color: var(--text-muted); font-size: 11px; }
      .legend-count {
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 700;
        margin-left: 4px;
      }

      /* Canvas */
      #canvas-container {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        bottom: 44px;
      }
      #canvas-container.with-sidebar { left: 312px; }

      /* Scan Overlay */
      #scan-overlay {
        position: fixed;
        top: 64px; left: 0; right: 0; bottom: 44px;
        background: rgba(249, 248, 244, 0.92);
        backdrop-filter: blur(8px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 80;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
      }
      #scan-overlay.active { display: flex; }
      #scan-status-text {
        margin-top: 20px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
      }
      .scan-beads {
        display: flex;
        gap: 8px;
      }
      .scan-bead {
        width: 16px; height: 16px;
        border-radius: 50%;
        animation: scanPulse 1.2s ease-in-out infinite;
      }
      .scan-bead:nth-child(2) { animation-delay: 0.15s; }
      .scan-bead:nth-child(3) { animation-delay: 0.3s; }
      .scan-bead:nth-child(4) { animation-delay: 0.45s; }
      .scan-bead:nth-child(5) { animation-delay: 0.6s; }
      @keyframes scanPulse {
        0%, 100% { transform: scale(0.6); opacity: 0.4; }
        50% { transform: scale(1.1); opacity: 1; }
      }

      /* Tooltip */
      #tooltip {
        position: fixed;
        display: none;
        background: var(--milk-white);
        border: 2px solid var(--cloud-beige);
        border-radius: var(--radius-md);
        padding: 12px 16px;
        pointer-events: none;
        z-index: 200;
        max-width: 280px;
        box-shadow: var(--shadow-card);
        font-size: 13px;
      }
      #tooltip .tt-name {
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 6px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #tooltip .tt-bead-icon {
        width: 14px; height: 14px;
        border-radius: 50%;
        box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
      }
      #tooltip .tt-meta {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.6;
      }
      #tooltip .tt-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }
      #tooltip .tt-label { color: var(--text-muted); }
      #tooltip .tt-value { color: var(--text-primary); font-weight: 700; }

      /* Detail Card */
      #detail-card {
        position: fixed;
        display: none;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: var(--milk-white);
        border: 2px solid var(--cloud-beige);
        border-radius: var(--radius-lg);
        padding: 28px;
        z-index: 150;
        width: 380px;
        box-shadow: var(--shadow-card);
      }
      #detail-card.visible { display: block; }
      #detail-card .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      #detail-card .card-bead {
        width: 32px; height: 32px;
        border-radius: 50%;
        box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.1);
        flex-shrink: 0;
      }
      #detail-card .card-title {
        font-size: 16px;
        font-weight: 800;
        color: var(--text-primary);
        word-break: break-all;
      }
      #detail-card .card-path {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
        word-break: break-all;
      }
      #detail-card .card-close {
        position: absolute;
        top: 14px; right: 18px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 22px;
        cursor: pointer;
        font-family: 'Nunito', sans-serif;
        transition: color 0.2s;
      }
      #detail-card .card-close:hover { color: var(--text-primary); }
      #detail-card .card-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--cloud-beige);
        font-size: 13px;
      }
      #detail-card .card-row:last-child { border-bottom: none; }
      #detail-card .card-label { color: var(--text-muted); font-weight: 600; }
      #detail-card .card-value { color: var(--text-primary); font-weight: 700; }
      #detail-card-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(249, 248, 244, 0.5);
        z-index: 140;
        display: none;
      }
      #detail-card-backdrop.visible { display: block; }

      /* Folder Picker Modal */
      #folder-picker-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(61, 58, 53, 0.4);
        backdrop-filter: blur(4px);
        z-index: 240;
        display: none;
      }
      #folder-picker-backdrop.visible { display: block; }
      #folder-picker {
        position: fixed;
        display: none;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: var(--milk-white);
        border: 2px solid var(--cloud-beige);
        border-radius: var(--radius-lg);
        padding: 24px;
        width: 540px;
        max-height: 70vh;
        z-index: 250;
        box-shadow: var(--shadow-card);
        flex-direction: column;
      }
      #folder-picker.visible { display: flex; }
      #folder-picker h2 {
        font-size: 16px;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 14px;
      }
      .folder-picker-pathbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--soft-cream);
        border-radius: var(--radius-sm);
        margin-bottom: 12px;
      }
      #folder-picker-up {
        background: var(--milk-white);
        border: 1px solid var(--cloud-beige);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        flex-shrink: 0;
      }
      #folder-picker-up:disabled { opacity: 0.4; cursor: not-allowed; }
      #folder-picker-up:hover:not(:disabled) { border-color: var(--folder-forest); }
      #folder-picker-path {
        flex: 1;
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 600;
        font-family: ui-monospace, monospace;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        direction: rtl;
        text-align: left;
      }
      #folder-picker-list {
        flex: 1;
        overflow-y: auto;
        background: var(--soft-cream);
        border-radius: var(--radius-sm);
        padding: 8px;
        min-height: 280px;
        max-height: 380px;
      }
      .picker-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .picker-row:hover { background: var(--milk-white); }
      .picker-row.selected { background: rgba(168, 213, 186, 0.25); }
      .picker-name { flex: 1; }
      .picker-error {
        color: var(--git-activity);
        font-weight: 700;
        padding: 16px;
        text-align: center;
      }
      .folder-picker-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }
      .folder-picker-actions button {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-md);
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      #folder-picker-cancel {
        background: var(--cloud-beige);
        color: var(--text-primary);
      }
      #folder-picker-select {
        background: linear-gradient(135deg, var(--folder-forest), #8BC4A8);
        color: #fff;
      }

      /* Bottom bar */
      #bottombar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 44px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        z-index: 100;
        padding: 0 24px;
      }
      .bottom-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .bottom-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        display: inline-block;
      }
      .pulse-dot {
        animation: pulseGlow 2s ease-in-out infinite;
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.4; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <nav id="topnav">
      <div class="logo">
        <div class="bead-cluster">
          <div class="mini-bead" style="background:#A8D5BA"></div>
          <div class="mini-bead" style="background:#9BC7F7"></div>
          <div class="mini-bead" style="background:#F3D19C"></div>
          <div class="mini-bead" style="background:#D7C3F1"></div>
          <div class="mini-bead" style="background:#FFB7B2"></div>
          <div class="mini-bead" style="background:#FFDCE5"></div>
        </div>
        <h1>BeadSpace</h1>
      </div>
      <div class="center">
        <div id="workspace-input-wrap">
          <span class="folder-icon">📁</span>
          <input id="path-input" type="text" placeholder="Select Local Workspace..." />
          <button id="browse-btn" type="button">Browse...</button>
        </div>
      </div>
      <div class="actions">
        <button id="scan-btn" class="btn-capsule">🔍 Scan</button>
        <button id="iron-btn" class="btn-capsule" type="button">♨ Iron</button>
        <div class="brush-control">
          Brush
          <input id="brush-slider" type="range" min="1" max="15" value="4" />
          <span id="brush-value">4</span>
        </div>
      </div>
    </nav>

    <aside id="left-sidebar">
      <h3>Iron Tools</h3>
      <button id="reset-board-btn" class="sidebar-btn">↻ Reset Board</button>
      <button id="all-cold-btn" class="sidebar-btn">❄ All Cold (rings)</button>
      <button id="all-fused-btn" class="sidebar-btn">🔥 All Fused (pixel art)</button>

      <h3>Languages</h3>
      <div id="legend-list"></div>
    </aside>

    <div id="scan-overlay">
      <div class="scan-beads">
        <div class="scan-bead" style="background:#A8D5BA"></div>
        <div class="scan-bead" style="background:#9BC7F7"></div>
        <div class="scan-bead" style="background:#F3D19C"></div>
        <div class="scan-bead" style="background:#D7C3F1"></div>
        <div class="scan-bead" style="background:#FFB7B2"></div>
      </div>
      <div id="scan-status-text">Discovering files...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="tooltip">
      <div class="tt-name">
        <span class="tt-bead-icon"></span>
        <span class="tt-filename"></span>
      </div>
      <div class="tt-meta"></div>
    </div>

    <div id="detail-card-backdrop"></div>
    <div id="detail-card">
      <button class="card-close">&times;</button>
      <div class="card-header">
        <div class="card-bead"></div>
        <div>
          <div class="card-title"></div>
          <div class="card-path"></div>
        </div>
      </div>
      <div id="card-rows"></div>
    </div>

    <div id="folder-picker-backdrop"></div>
    <div id="folder-picker">
      <h2>Select Workspace Folder</h2>
      <div class="folder-picker-pathbar">
        <button id="folder-picker-up" type="button">↑ Up</button>
        <div id="folder-picker-path"></div>
      </div>
      <div id="folder-picker-list"></div>
      <div class="folder-picker-actions">
        <button id="folder-picker-cancel" type="button">Cancel</button>
        <button id="folder-picker-select" type="button">Select this folder</button>
      </div>
    </div>

    <footer id="bottombar">
      <div class="bottom-item">
        <span class="bottom-dot pulse-dot" style="background:var(--folder-forest)"></span>
        <span id="bottom-mood">Mood: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot" style="background:var(--model-lake)"></span>
        <span id="bottom-structures">Structures: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot" style="background:var(--dataset-sand)"></span>
        <span id="bottom-regions">Regions: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot pulse-dot" style="background:var(--git-activity)"></span>
        <span id="bottom-energy">Commit Energy: —</span>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
