<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeadSpace — The Living Jigsaw Puzzle World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --milk-white: #F9F8F4;
        --soft-cream: #F4F1EA;
        --cloud-beige: #ECE7DF;
        --text-primary: #3D3A35;
        --text-secondary: #8A857D;
        --text-muted: #B5B0A8;
        --folder-forest: #A8D5BA;
        --model-lake: #9BC7F7;
        --dataset-sand: #F3D19C;
        --docs-library: #D7C3F1;
        --git-activity: #FFB7B2;
        --ai-generated: #FFDCE5;
        --hover-glow: #FFFFFF;
        --selected-glow: #FFF1B8;
        --active-anim: #B8F7D4;
        --glass-bg: rgba(244, 241, 234, 0.75);
        --glass-border: rgba(189, 183, 172, 0.3);
        --shadow-soft: 0 4px 24px rgba(61, 58, 53, 0.08);
        --shadow-card: 0 8px 32px rgba(61, 58, 53, 0.12);
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 24px;
      }
      body {
        background: var(--milk-white);
        color: var(--text-primary);
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
        height: 100vh;
      }

      /* ── Top Navigation Bar ── */
      #topnav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 64px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        padding: 0 24px;
        z-index: 100;
        box-shadow: var(--shadow-soft);
      }
      #topnav .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: default;
        user-select: none;
      }
      #topnav .logo .bead-cluster {
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
        width: 28px;
      }
      #topnav .logo .bead-cluster .mini-bead {
        width: 8px; height: 8px;
        border-radius: 50%;
        transition: transform 0.3s ease;
      }
      #topnav .logo:hover .mini-bead {
        animation: jiggle 0.4s ease infinite alternate;
      }
      @keyframes jiggle {
        0% { transform: translate(0, 0); }
        100% { transform: translate(1px, -1px) rotate(5deg); }
      }
      #topnav .logo h1 {
        font-size: 20px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.5px;
      }

      #topnav .center {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 0 32px;
      }
      #workspace-input-wrap {
        position: relative;
        width: 100%;
        max-width: 420px;
      }
      #path-input {
        width: 100%;
        padding: 10px 16px 10px 40px;
        background: var(--milk-white);
        border: 2px dashed var(--cloud-beige);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: 'Nunito', sans-serif;
        font-size: 14px;
        font-weight: 600;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      #path-input::placeholder { color: var(--text-muted); font-weight: 400; }
      #path-input:focus {
        outline: none;
        border-color: var(--folder-forest);
        box-shadow: 0 0 0 4px rgba(168, 213, 186, 0.2);
      }
      #workspace-input-wrap .folder-icon {
        position: absolute;
        left: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
      }

      #topnav .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .btn-capsule {
        padding: 8px 20px;
        border: none;
        border-radius: 50px;
        font-family: 'Nunito', sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }
      .btn-capsule:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      }
      .btn-capsule:active { transform: translateY(0); }
      .btn-capsule:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      #scan-btn {
        background: linear-gradient(135deg, var(--folder-forest), #8BC4A8);
        color: #fff;
      }
      #regen-btn {
        background: linear-gradient(135deg, var(--docs-library), #C0A8E8);
        color: #fff;
      }

      /* ── Left Sidebar ── */
      #left-sidebar {
        position: fixed;
        top: 80px;
        left: 16px;
        bottom: 60px;
        width: 260px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 20px;
        z-index: 90;
        box-shadow: var(--shadow-soft);
        overflow-y: auto;
        display: none;
      }
      #left-sidebar.visible { display: block; }
      #left-sidebar h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        margin-top: 20px;
      }
      #left-sidebar h3:first-child { margin-top: 0; }

      .layer-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        cursor: pointer;
      }
      .layer-toggle .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        margin-right: 10px;
        display: inline-block;
      }
      .toggle-switch {
        width: 36px; height: 20px;
        background: var(--cloud-beige);
        border-radius: 10px;
        position: relative;
        cursor: pointer;
        transition: background 0.3s;
      }
      .toggle-switch.on { background: var(--folder-forest); }
      .toggle-switch::after {
        content: '';
        position: absolute;
        top: 2px; left: 2px;
        width: 16px; height: 16px;
        background: white;
        border-radius: 50%;
        transition: transform 0.3s;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      }
      .toggle-switch.on::after { transform: translateX(16px); }

      .theme-card {
        padding: 10px 14px;
        background: var(--milk-white);
        border: 1px solid var(--cloud-beige);
        border-radius: var(--radius-sm);
        margin-bottom: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .theme-card:hover {
        border-color: var(--folder-forest);
        box-shadow: 0 2px 8px rgba(168, 213, 186, 0.2);
      }
      .theme-card.active {
        border-color: var(--folder-forest);
        background: rgba(168, 213, 186, 0.1);
      }
      .theme-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 400; }

      /* Language legend */
      #legend-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
      }
      .legend-bead {
        width: 12px; height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.08);
      }
      .legend-count {
        margin-left: auto;
        color: var(--text-muted);
        font-size: 12px;
      }

      /* ── Canvas Container ── */
      #canvas-container {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        bottom: 44px;
      }
      #canvas-container.with-sidebar { left: 292px; }

      /* ── Scan Overlay ── */
      #scan-overlay {
        position: fixed;
        top: 64px; left: 0; right: 0; bottom: 44px;
        background: rgba(249, 248, 244, 0.9);
        backdrop-filter: blur(8px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 80;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
      }
      #scan-overlay.active { display: flex; }
      #scan-status-text {
        margin-top: 20px;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-secondary);
      }
      .scan-beads {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .scan-bead {
        width: 16px; height: 16px;
        border-radius: 50%;
        animation: scanPulse 1.2s ease-in-out infinite;
      }
      .scan-bead:nth-child(2) { animation-delay: 0.15s; }
      .scan-bead:nth-child(3) { animation-delay: 0.3s; }
      .scan-bead:nth-child(4) { animation-delay: 0.45s; }
      .scan-bead:nth-child(5) { animation-delay: 0.6s; }
      @keyframes scanPulse {
        0%, 100% { transform: scale(0.6); opacity: 0.4; }
        50% { transform: scale(1.1); opacity: 1; }
      }

      /* ── Tooltip (Floating Bead Card) ── */
      #tooltip {
        position: fixed;
        display: none;
        background: var(--milk-white);
        border: 2px solid var(--cloud-beige);
        border-radius: var(--radius-md);
        padding: 14px 18px;
        pointer-events: none;
        z-index: 200;
        max-width: 300px;
        box-shadow: var(--shadow-card);
        font-size: 13px;
      }
      #tooltip .tt-name {
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 6px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #tooltip .tt-bead-icon {
        width: 14px; height: 14px;
        border-radius: 50%;
        box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
      }
      #tooltip .tt-meta {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.6;
      }
      #tooltip .tt-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }
      #tooltip .tt-label { color: var(--text-muted); }
      #tooltip .tt-value { color: var(--text-primary); font-weight: 700; }

      /* ── File Detail Card (Click) ── */
      #detail-card {
        position: fixed;
        display: none;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: var(--milk-white);
        border: 2px solid var(--cloud-beige);
        border-radius: var(--radius-lg);
        padding: 28px;
        z-index: 150;
        width: 360px;
        box-shadow: var(--shadow-card);
      }
      #detail-card.visible { display: block; }
      #detail-card .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      #detail-card .card-bead {
        width: 32px; height: 32px;
        border-radius: 50%;
        box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.1);
      }
      #detail-card .card-title {
        font-size: 16px;
        font-weight: 800;
        color: var(--text-primary);
      }
      #detail-card .card-path {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
      }
      #detail-card .card-close {
        position: absolute;
        top: 14px; right: 18px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 20px;
        cursor: pointer;
        font-family: 'Nunito', sans-serif;
        transition: color 0.2s;
      }
      #detail-card .card-close:hover { color: var(--text-primary); }
      #detail-card .card-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--cloud-beige);
        font-size: 13px;
      }
      #detail-card .card-row:last-child { border-bottom: none; }
      #detail-card .card-label { color: var(--text-muted); font-weight: 600; }
      #detail-card .card-value { color: var(--text-primary); font-weight: 700; }
      #detail-card-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(249, 248, 244, 0.5);
        z-index: 140;
        display: none;
      }
      #detail-card-backdrop.visible { display: block; }

      /* ── Bottom Bar ── */
      #bottombar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 44px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        z-index: 100;
        padding: 0 24px;
      }
      .bottom-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .bottom-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        display: inline-block;
      }
      .pulse-dot {
        animation: pulseGlow 2s ease-in-out infinite;
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.4; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <!-- Top Navigation -->
    <nav id="topnav">
      <div class="logo">
        <div class="bead-cluster">
          <div class="mini-bead" style="background:#A8D5BA"></div>
          <div class="mini-bead" style="background:#9BC7F7"></div>
          <div class="mini-bead" style="background:#F3D19C"></div>
          <div class="mini-bead" style="background:#D7C3F1"></div>
          <div class="mini-bead" style="background:#FFB7B2"></div>
          <div class="mini-bead" style="background:#FFDCE5"></div>
        </div>
        <h1>BeadSpace</h1>
      </div>
      <div class="center">
        <div id="workspace-input-wrap">
          <span class="folder-icon">📁</span>
          <input id="path-input" type="text" placeholder="Select Local Workspace..." />
        </div>
      </div>
      <div class="actions">
        <button id="scan-btn" class="btn-capsule">🔍 Scan Workspace</button>
        <button id="regen-btn" class="btn-capsule">✨ Regenerate</button>
      </div>
    </nav>

    <!-- Left Sidebar -->
    <aside id="left-sidebar">
      <h3>Workspace Layers</h3>
      <div id="layer-toggles"></div>

      <h3>Theme</h3>
      <div id="theme-cards">
        <div class="theme-card active" data-theme="candy">
          <div>🍬 Candy City</div>
          <div class="theme-subtitle">playful pastel</div>
        </div>
        <div class="theme-card" data-theme="cozy">
          <div>🏠 Cozy Workshop</div>
          <div class="theme-subtitle">warm wood tones</div>
        </div>
        <div class="theme-card" data-theme="zen">
          <div>🧘 Minimal Zen</div>
          <div class="theme-subtitle">reduced structures</div>
        </div>
        <div class="theme-card" data-theme="neural">
          <div>🧠 Neural Dream</div>
          <div class="theme-subtitle">glowing AI fantasy</div>
        </div>
      </div>

      <h3>Languages</h3>
      <div id="legend-list"></div>
    </aside>

    <!-- Scan Overlay -->
    <div id="scan-overlay">
      <div class="scan-beads">
        <div class="scan-bead" style="background:#A8D5BA"></div>
        <div class="scan-bead" style="background:#9BC7F7"></div>
        <div class="scan-bead" style="background:#F3D19C"></div>
        <div class="scan-bead" style="background:#D7C3F1"></div>
        <div class="scan-bead" style="background:#FFB7B2"></div>
      </div>
      <div id="scan-status-text">Discovering files...</div>
    </div>

    <!-- Canvas -->
    <div id="canvas-container"></div>

    <!-- Tooltip -->
    <div id="tooltip">
      <div class="tt-name">
        <span class="tt-bead-icon"></span>
        <span class="tt-filename"></span>
      </div>
      <div class="tt-meta"></div>
    </div>

    <!-- Detail Card (click) -->
    <div id="detail-card-backdrop"></div>
    <div id="detail-card">
      <button class="card-close">&times;</button>
      <div class="card-header">
        <div class="card-bead"></div>
        <div>
          <div class="card-title"></div>
          <div class="card-path"></div>
        </div>
      </div>
      <div id="card-rows"></div>
    </div>

    <!-- Bottom Bar -->
    <footer id="bottombar">
      <div class="bottom-item">
        <span class="bottom-dot pulse-dot" style="background:var(--folder-forest)"></span>
        <span id="bottom-mood">Workspace Mood: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot" style="background:var(--model-lake)"></span>
        <span id="bottom-structures">Structures: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot" style="background:var(--dataset-sand)"></span>
        <span id="bottom-regions">Regions: —</span>
      </div>
      <div class="bottom-item">
        <span class="bottom-dot pulse-dot" style="background:var(--git-activity)"></span>
        <span id="bottom-energy">Commit Energy: —</span>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
